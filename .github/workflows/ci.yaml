name: CI

on:
  push:
    branches:
      - lab3
      - lab3_autotests*
  pull_request:
    branches:
      - lab3
      - lab3_autotests*

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Start application
        env:
          DEPLOY_REF: ${{ github.sha }}
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          for i in {1..30}; do
            curl --fail --silent http://127.0.0.1:8181/login >/dev/null && exit 0
            sleep 1
          done
          exit 1

      - name: Run tests
        run: |
          python -m pytest -v --browser chromium --junitxml=test_result.xml tests

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
          if-no-files-found: error

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kozlovdan/catty-reminders-app
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
