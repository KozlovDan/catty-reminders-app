name: CI

on:
  push:
    branches:
      - lab2
  pull_request:
    branches:
      - catty-reminders-app
      - main
      - lab2

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          set -o pipefail
          python -m pytest tests/test_unit.py -q 2>&1 | tee test_result.txt

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
          if-no-files-found: error
