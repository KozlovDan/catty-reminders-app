name: CI

on:
  push:
    branches:
      - lab4
      - lab4_autotests*
  pull_request:
    branches:
      - lab4
      - lab4_autotests*

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -v --junitxml=test_result.xml tests/test_unit.py

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}

      - name: Smoke test Docker Compose stack
        env:
          IMAGE: ${{ steps.image.outputs.name }}:${{ github.sha }}
          DEPLOY_REF: ${{ github.sha }}
        run: |
          docker compose config
          docker compose up -d
          for i in {1..60}; do
            curl --fail --silent http://127.0.0.1:8181/login >/dev/null && exit 0
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down
