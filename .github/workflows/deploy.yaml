name: CD

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SSH_HOST: course.prafdin.ru
  SSH_PORT: "3147"
  SSH_USER: ${{ secrets.SSH_USER || 'a1234' }}
  APP_URL: http://app.kozlov.course.prafdin.ru/login
  IMAGE_NAME: ghcr.io/kozlovdan/catty-reminders-app
  CONTAINER_NAME: catty-reminders-app

jobs:
  deploy:
    name: Build image and deploy container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build and test on runner
        run: |
          set -o pipefail
          python -m pytest tests/test_unit.py -q 2>&1 | tee test_result.txt

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.txt
          if-no-files-found: error

      - name: Resolve deploy SHA
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.DEPLOY_SHA }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.DEPLOY_SHA }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "IMAGE_NAME='$IMAGE_NAME' CONTAINER_NAME='$CONTAINER_NAME' DEPLOY_SHA='$DEPLOY_SHA' GHCR_USER='${{ github.actor }}' GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:/Applications/Docker.app/Contents/Resources/bin:$PATH"
          export DOCKER_CONFIG="$(mktemp -d /tmp/catty-docker-config.XXXXXX)"
          trap 'rm -rf "$DOCKER_CONFIG"' EXIT
          command -v docker
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE_NAME:$DEPLOY_SHA"
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p 8181:8181 \
            -e DEPLOY_REF="$DEPLOY_SHA" \
            "$IMAGE_NAME:$DEPLOY_SHA"
          REMOTE

      - name: Verify deployed app
        run: |
          curl --fail --retry 10 --retry-delay 5 --retry-all-errors "$APP_URL" | grep deployref
