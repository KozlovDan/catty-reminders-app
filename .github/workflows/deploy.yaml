name: CD

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Resolve deploy commit
        id: deploy
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build and test on runner
        run: python -m pytest -v tests/test_unit.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.deploy.outputs.sha }}
          build-args: |
            DEPLOY_REF=${{ steps.deploy.outputs.sha }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3147
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/catty-reminders-app"
            fi
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > docker-compose.yaml <<'COMPOSE'
            services:
              db:
                image: mariadb:10.11
                container_name: catty-db
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: mypass
                  MYSQL_DATABASE: catty_reminders
                healthcheck:
                  test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                  start_period: 20s
                volumes:
                  - catty-db-data:/var/lib/mysql

              app:
                image: ${IMAGE:-catty-reminders-app:local}
                pull_policy: ${APP_PULL_POLICY:-missing}
                container_name: catty-reminders-app
                restart: unless-stopped
                depends_on:
                  db:
                    condition: service_healthy
                ports:
                  - "${HOST_PORT:-8181}:8181"
                environment:
                  STORAGE_BACKEND: mysql
                  MYSQL_HOST: db
                  MYSQL_PORT: "3306"
                  MYSQL_USER: root
                  MYSQL_PASSWORD: mypass
                  MYSQL_DATABASE: catty_reminders
                  DB_HOST: db
                  DB_PORT: "3306"
                  DB_USER: root
                  DB_PASSWORD: mypass
                  DB_NAME: catty_reminders

            volumes:
              catty-db-data:
            COMPOSE

            DOCKER_BIN="$(command -v docker || true)"
            if [ -z "$DOCKER_BIN" ] && [ -x /opt/homebrew/bin/docker ]; then
              DOCKER_BIN="/opt/homebrew/bin/docker"
            fi
            if [ -z "$DOCKER_BIN" ] && [ -x /usr/local/bin/docker ]; then
              DOCKER_BIN="/usr/local/bin/docker"
            fi
            if [ -z "$DOCKER_BIN" ]; then
              echo "docker command not found" >&2
              exit 1
            fi

            export PATH="$(dirname "$DOCKER_BIN"):$PATH"
            export DOCKER_CONFIG="${DOCKER_CONFIG:-/tmp/catty-docker-config}"
            mkdir -p "$DOCKER_CONFIG"

            if "$DOCKER_BIN" compose version >/dev/null 2>&1; then
              compose() { "$DOCKER_BIN" compose "$@"; }
            elif command -v docker-compose >/dev/null 2>&1; then
              DOCKER_COMPOSE_BIN="$(command -v docker-compose)"
              compose() { "$DOCKER_COMPOSE_BIN" "$@"; }
            elif [ -x /opt/homebrew/bin/docker-compose ]; then
              DOCKER_COMPOSE_BIN="/opt/homebrew/bin/docker-compose"
              compose() { "$DOCKER_COMPOSE_BIN" "$@"; }
            elif [ -x /usr/local/bin/docker-compose ]; then
              DOCKER_COMPOSE_BIN="/usr/local/bin/docker-compose"
              compose() { "$DOCKER_COMPOSE_BIN" "$@"; }
            else
              echo "docker compose command not found" >&2
              exit 1
            fi

            echo "${{ github.token }}" | "$DOCKER_BIN" login ghcr.io -u "${{ github.actor }}" --password-stdin

            export IMAGE="${{ steps.image.outputs.name }}:${{ steps.deploy.outputs.sha }}"
            export APP_PULL_POLICY=always

            "$DOCKER_BIN" pull "$IMAGE"
            compose -f docker-compose.yaml --project-name catty up -d db || true

            "$DOCKER_BIN" network create catty_default 2>/dev/null || true
            "$DOCKER_BIN" start catty-db 2>/dev/null || true
            "$DOCKER_BIN" network connect --alias db catty_default catty-db 2>/dev/null || true

            "$DOCKER_BIN" stop catty-reminders-app 2>/dev/null || true
            "$DOCKER_BIN" rm catty-reminders-app 2>/dev/null || true

            for container_id in $("$DOCKER_BIN" ps -q --filter publish=8181); do
              "$DOCKER_BIN" stop "$container_id" || true
            done

            if command -v lsof >/dev/null 2>&1; then
              for pid in $(lsof -ti tcp:8181 -sTCP:LISTEN 2>/dev/null || true); do
                kill "$pid" 2>/dev/null || true
              done
              sleep 2
              for pid in $(lsof -ti tcp:8181 -sTCP:LISTEN 2>/dev/null || true); do
                kill -9 "$pid" 2>/dev/null || true
              done
            fi

            "$DOCKER_BIN" run -d \
              --name catty-reminders-app \
              --restart unless-stopped \
              --network catty_default \
              -p 8181:8181 \
              -e STORAGE_BACKEND=mysql \
              -e MYSQL_HOST=db \
              -e MYSQL_PORT=3306 \
              -e MYSQL_USER=root \
              -e MYSQL_PASSWORD=mypass \
              -e MYSQL_DATABASE=catty_reminders \
              -e DB_HOST=db \
              -e DB_PORT=3306 \
              -e DB_USER=root \
              -e DB_PASSWORD=mypass \
              -e DB_NAME=catty_reminders \
              "$IMAGE"

            for i in $(seq 1 30); do
              if curl --fail --silent http://127.0.0.1:8181/login | grep -q "${{ steps.deploy.outputs.sha }}"; then
                exit 0
              fi
              sleep 2
            done

            "$DOCKER_BIN" ps -a
            "$DOCKER_BIN" logs catty-reminders-app 2>/dev/null || true
            exit 1
