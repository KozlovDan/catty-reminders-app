name: CD

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build and test on runner
        run: python -m pytest -v tests/test_unit.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            DEPLOY_REF=${{ github.sha }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          port: 3147
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/catty-reminders-app"
            fi
            cd "$APP_DIR"
            IMAGE="${{ steps.image.outputs.name }}:${{ github.sha }}" \
            GITHUB_ACTOR="${{ github.actor }}" \
            GITHUB_TOKEN="${{ github.token }}" \
            APP_DIR="$PWD" \
            ./scripts/deploy.sh lab4 ${{ github.sha }}
